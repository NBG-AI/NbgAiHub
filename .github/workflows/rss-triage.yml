name: rss-triage

# PAUSED 2026-06-08 — daily cron removed. Pipeline is no longer in active use
# but the workflow + pipeline code stay in the repo for future re-activation.
# Manual `workflow_dispatch` is preserved so an operator can still kick off a
# run on demand. To re-enable the daily run, restore the `schedule:` block
# below (was `- cron: "0 22 * * *"` — daily 22:00 UTC = 00:00 Athens winter /
# 01:00 Athens DST; rationale in DECISIONS 2026-05-21).
on:
  workflow_dispatch: {}

# Workflow-scoped GITHUB_TOKEN permissions (AC18).
# This block MUST contain exactly `contents: write` and `pull-requests: write`
# and nothing else. Anything more is over-privileged; anything less and
# `git push` (contents) or `gh pr create` (pull-requests) will fail at runtime.
permissions:
  contents: write
  pull-requests: write

# Reconciliation R-2 (Investigation §7). Fixed group name — cron always fires
# on the default branch, so there is no ref to parameterize on. With
# `cancel-in-progress: false` an in-flight pipeline finishes its PR rather
# than being killed mid-`gh pr create`. A manual `workflow_dispatch` that
# arrives while a cron run is mid-flight is queued behind it, not run in
# parallel.
concurrency:
  group: rss-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # NOTE: `actions/checkout@v4` defaults `persist-credentials: true` —
      # that default is LOAD-BEARING for the `git push` in the editorial-PR
      # step below. Do not set `persist-credentials: false` here without
      # re-wiring auth (Investigation §3 pitfall).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # needed so dedup.ts can walk full /news history

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version-file: pipeline/.nvmrc
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install pipeline dependencies
        run: npm ci
        working-directory: pipeline

      - name: Build pipeline
        run: npm run build
        working-directory: pipeline

      # Run the Node orchestrator. It reads the four AZURE_OPENAI_* secrets,
      # walks the feeds, calls Azure OpenAI per item, emits markdown files to
      # /news/incoming/ (editorial review) and/or /news/published/ (variant C
      # auto-promote — high confidence + auto_promote_eligible source), writes
      # pipeline/pr-body.md when there is at least one item, and sets four
      # step outputs on $GITHUB_OUTPUT:
      #   new_items           = "true" | "false"
      #   auto_promote_count  = "<N>"
      #   review_count        = "<M>"
      #   mode                = "auto_only" | "mixed" | "review_only" | "empty"
      # The subsequent steps are gated on `mode` (AC14 empty-run no-op).
      - name: Run RSS triage pipeline
        id: pipeline
        run: npm run start
        working-directory: pipeline
        env:
          AZURE_OPENAI_ENDPOINT:    ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT:  ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_API_KEY:     ${{ secrets.AZURE_OPENAI_API_KEY }}
          # Reddit Application-Only OAuth (DECISIONS 2026-05-21 OAuth pivot).
          # Required when any reddit-json feed is enabled; the orchestrator
          # gates the env-var read on config so the secrets only need to exist
          # if the Reddit feeds are turned on.
          REDDIT_CLIENT_ID:         ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET:     ${{ secrets.REDDIT_CLIENT_SECRET }}

      # Direct-to-main path (post-DECISIONS 2026-05-19 unconditional-auto-promote
      # + rolling 7-day retention). Fires when ANY change occurred — new
      # items auto-promoted OR stale items pruned (or both). Skipped only when
      # the orchestrator chose the editorial PR path (mixed/review_only),
      # which the current all-eligible config never hits but is preserved for
      # operator flexibility.
      - name: Commit auto-promoted items + retention deletions to main
        if: |
          steps.pipeline.outputs.had_changes == 'true' &&
          steps.pipeline.outputs.mode != 'mixed' &&
          steps.pipeline.outputs.mode != 'review_only'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE_UTC=$(date -u +%F)
          N="${{ steps.pipeline.outputs.auto_promote_count }}"
          P="${{ steps.pipeline.outputs.pruned_count }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Keep the AUTO doc-count blocks in SCOPE.md / CLAUDE.md in sync with
          # the new news/published/ count BEFORE staging — otherwise the next
          # docs-drift CI run on `main` fails (root cause of the recurring
          # "docs-drift: All jobs have failed" emails, DECISIONS 2026-06-08).
          node scripts/sync-doc-counts.mjs
          # `git add news/published` stages new files AND deletions of pruned
          # items (7-day rolling window per DECISIONS 2026-05-19); the second
          # `git add` carries the regenerated AUTO blocks alongside.
          git add news/published SCOPE.md CLAUDE.md
          git commit -m "News triage ${DATE_UTC}: ${N} auto-promoted, ${P} pruned"
          git push origin main

      # Variant C path: mixed or review_only — open the editorial PR. The
      # orchestrator may have written files to news/incoming/ AND
      # news/published/ (mixed), so we stage both directories. The PR body
      # rendered by the orchestrator labels which items went where.
      - name: Open editorial PR
        if: steps.pipeline.outputs.mode == 'mixed' || steps.pipeline.outputs.mode == 'review_only'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE_UTC=$(date -u +%F)
          BRANCH="news-triage/${DATE_UTC}-${GITHUB_RUN_ID:0:7}"
          AUTO_N="${{ steps.pipeline.outputs.auto_promote_count }}"
          REVIEW_N="${{ steps.pipeline.outputs.review_count }}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          # Sync AUTO doc-count blocks before staging so the PR carries the
          # updated counts and docs-drift CI passes on the PR check (mirror of
          # the auto-promote path above, DECISIONS 2026-06-08).
          node scripts/sync-doc-counts.mjs
          git add news/incoming news/published SCOPE.md CLAUDE.md
          git commit -m "News triage ${DATE_UTC} (${AUTO_N} auto + ${REVIEW_N} review)"
          git push origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "News triage ${DATE_UTC} (${AUTO_N} auto + ${REVIEW_N} review)" \
            --body-file pipeline/pr-body.md

      # No-op — no new items AND no retention deletions. Placeholder step so
      # the workflow's intent is fully spelled out at the YAML level rather
      # than relying on absence-of-step semantics.
      - name: No-op (empty run)
        if: steps.pipeline.outputs.had_changes == 'false'
        run: echo "No new items this run — nothing to commit."
